name: Update Telegram Message

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run bot
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.YOUR_CHAT_ID }}
          MESSAGE_ID: ${{ secrets.YOUR_MESSAGE_ID }}
          MARKETAPP_API_TOKEN: ${{ secrets.MARKETAPP_API_TOKEN }}
          COLLECTION_ADDRESS: "EQCA14o1-VWhS2efqoh_9M1b_A9DtKTuoqfmkn83AbJzwnPi"
          TOP_N_EACH: "20"
          TZ: "Asia/Shanghai"
          MAX_PAGES: "50"
        run: python bot.py
