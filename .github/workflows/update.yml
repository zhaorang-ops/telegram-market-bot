name: Update Telegram Messages

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run bot
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          MARKETAPP_API_TOKEN: ${{ secrets.MARKETAPP_API_TOKEN }}

          USERNAMES_CHAT_ID: ${{ secrets.USERNAMES_CHAT_ID }}
          USERNAMES_MESSAGE_ID: ${{ secrets.USERNAMES_MESSAGE_ID }}

          NUMBERS_CHAT_ID: ${{ secrets.NUMBERS_CHAT_ID }}
          NUMBERS_MESSAGE_ID: ${{ secrets.NUMBERS_MESSAGE_ID }}

          USERNAMES_COLLECTION_ADDRESS: "EQCA14o1-VWhS2efqoh_9M1b_A9DtKTuoqfmkn83AbJzwnPi"

          # 这里填匿名号 collection 链接或地址本体
          NUMBERS_COLLECTION_ADDRESS: "https://marketapp.ws/collection/EQAOQdwdw8kGftJCSFgOErM1mBjYPe4DBPq8-AhF6vr9si5N/"

          TZ: "Asia/Shanghai"
          MAX_PAGES: "200"
          # TON_USD_OVERRIDE: "7.95"

        run: python bot.py
